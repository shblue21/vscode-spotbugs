name: Bug report
description: Report a bug in the SpotBugs VS Code extension.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please describe what went wrong and how to reproduce it.

  - type: textarea
    id: details
    attributes:
      label: Bug description
      description: Include what happened, how to reproduce it, and what you expected.
      placeholder: |
        What happened?

        Steps to reproduce:
        1.
        2.

        Expected behavior:
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Optional. Add versions if they seem relevant.
      value: |
        - OS:
        - VS Code version:
        - SpotBugs extension version:
        - Java version:
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Optional. Add logs, screenshots, or a sample project.
      placeholder: Paste logs, add screenshots, or link a small sample repository.
    validations:
      required: false
