name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub release tag to publish
        required: true
        type: string
      target:
        description: Marketplace target
        required: true
        default: both
        type: choice
        options:
          - both
          - marketplace
          - openvsx

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Download release VSIX
        id: asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          VSIX="dist/vscode-spotbugs-${TAG}.vsix"
          mkdir dist
          gh release download "${TAG}" --repo "${GITHUB_REPOSITORY}" --pattern "$(basename "${VSIX}")" --dir dist
          if [[ ! -f "${VSIX}" ]]; then
            echo "Release asset not found: ${VSIX}" >&2
            exit 1
          fi
          echo "path=${VSIX}" >> "$GITHUB_OUTPUT"

      - name: Publish to VS Code Marketplace
        id: marketplace
        if: ${{ inputs.target == 'both' || inputs.target == 'marketplace' }}
        continue-on-error: true
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx --yes @vscode/vsce publish --packagePath "${{ steps.asset.outputs.path }}" -p "${VSCE_PAT}"

      - name: Publish to Open VSX
        id: openvsx
        if: ${{ always() && steps.asset.outcome == 'success' && (inputs.target == 'both' || inputs.target == 'openvsx') }}
        continue-on-error: true
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx@1.0.2 publish "${{ steps.asset.outputs.path }}" -p "${OVSX_PAT}"

      - name: Check publish results
        if: ${{ always() && (steps.marketplace.outcome == 'failure' || steps.openvsx.outcome == 'failure') }}
        run: exit 1
