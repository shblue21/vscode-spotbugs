name: Generate Changelog

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with tags)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Git author (for committing)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve last tag (if any)
        id: lasttag
        shell: bash
        run: |
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            echo "value=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT
          else
            echo "value=" >> $GITHUB_OUTPUT
          fi

      - name: Build range arg
        id: range
        env:
          LAST_TAG: ${{ steps.lasttag.outputs.value }}
        run: |
          if [ -n "${LAST_TAG}" ]; then
            echo "value=--range ${LAST_TAG}..HEAD" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: >-
            --unreleased
            ${{ steps.range.outputs.value }}
            -o CHANGELOG.md

      - name: Commit CHANGELOG if changed
        run: |
          if ! git diff --quiet -- CHANGELOG.md; then
            git add CHANGELOG.md
            git commit -m "docs(changelog): update [Unreleased] from last tag"
            git push
          else
            echo "No changes in CHANGELOG.md"
          fi
