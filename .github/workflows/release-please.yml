name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: GitHub release tag to publish
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Checkout release tag
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag_name }}

      - name: Setup Node.js
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Setup Java (build JDK for Tycho)
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm ci

      - name: Build Java backend
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm run build-server

      - name: Clean
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm run clean

      - name: Build TypeScript
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm run compile

      - name: Lint
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm run lint

      - name: Install vsce
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: npm i -g @vscode/vsce

      - name: Package VSIX (release)
        if: ${{ steps.release.outputs.release_created == 'true' }}
        id: pkg
        shell: bash
        run: |
          TAG="${{ steps.release.outputs.tag_name }}"
          NAME="$(jq -r '.name' package.json)"
          VSIX="${NAME}-${TAG}.vsix"
          vsce package --out "${VSIX}"
          echo "vsix=${VSIX}" >> "$GITHUB_OUTPUT"

      - name: Upload VSIX to GitHub Release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.release.outputs.tag_name }}" "${{ steps.pkg.outputs.vsix }}" --clobber

      - name: Publish to VS Code Marketplace (optional)
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          if [[ -z "${VSCE_PAT}" ]]; then
            echo "VSCE_PAT not set; skipping publish"
            exit 0
          fi
          vsce publish --packagePath "${{ steps.pkg.outputs.vsix }}" -p "${VSCE_PAT}"

      - name: Publish to Open VSX
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        shell: bash
        run: |
          if [[ -z "${OVSX_PAT}" ]]; then
            echo "OVSX_PAT is not configured" >&2
            exit 1
          fi
          npx --yes ovsx@1.0.2 publish "${{ steps.pkg.outputs.vsix }}" -p "${OVSX_PAT}"

  publish-existing-release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Publish existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        shell: bash
        run: |
          mkdir release
          gh release download "${TAG}" --pattern '*.vsix' --dir release
          VSIX="$(find release -type f -name '*.vsix' -print -quit)"
          if [[ -z "${VSIX}" ]]; then
            echo "No VSIX found for ${TAG}" >&2
            exit 1
          fi
          STATUS=0
          npx --yes @vscode/vsce publish --packagePath "${VSIX}" -p "${VSCE_PAT}" || STATUS=1
          npx --yes ovsx@1.0.2 publish "${VSIX}" -p "${OVSX_PAT}" || STATUS=1
          exit "${STATUS}"
